<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo completo | Kondorito</title>
  <style>
    body{font-family:Arial, sans-serif;margin:0;background:#0b1220;color:#e8eefc}
    header{padding:18px 22px;background:#0f1a30;position:sticky;top:0}
    .wrap{max-width:1100px;margin:0 auto}
    .top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    input, select{padding:10px 12px;border-radius:10px;border:1px solid #2a3a64;background:#0b1220;color:#e8eefc}
    .grid{display:grid;grid-template-columns:repeat(1,minmax(0,1fr));gap:16px;padding:18px 22px}
    @media(min-width:700px){.grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
    @media(min-width:1024px){.grid{grid-template-columns:repeat(4,minmax(0,1fr));}}
    .card{background:#0f1a30;border:1px solid #24345c;border-radius:16px;overflow:hidden}
    .card img{width:100%;height:160px;object-fit:cover;display:block}
    .p{padding:12px}
    .name{font-weight:700;margin:0 0 6px}
    .desc{opacity:.9;font-size:13px;margin:0 0 10px;min-height:32px}
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .price{font-weight:700}
    .tag{font-size:12px;padding:4px 8px;border-radius:999px;background:#16264a;border:1px solid #2a3a64}
    .btn{cursor:pointer;border:none;border-radius:12px;padding:10px 12px;background:#2b6cff;color:white;font-weight:700}
    .btn:active{transform:scale(.99)}
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div>
        <h2 style="margin:0">Catálogo completo</h2>
        <small style="opacity:.85">Tortas — Kondorito Postres y Pasteles</small>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input id="search" type="text" placeholder="Buscar torta..." />
        <select id="category">
          <option value="all">Todas</option>
          <option value="Tortas">Tortas</option>
          <option value="Cupcakes">Cupcakes</option>
          <option value="Postres">Postres</option>
        </select>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div id="catalogGrid" class="grid"></div>
  </main>

  <script>
    // ✅ Puedes ampliar esta lista con TODO tu catálogo
    const catalogoData = [
      { id: 1, name: "Torta Chocolate Supreme", description: "Chocolate negro con ganache y frambuesas", price: 45.99, image: "https://picsum.photos/400/300?random=2", alt: "Torta chocolate", category: "Tortas" },
      { id: 2, name: "Red Velvet Clásica", description: "Bizcocho rojo con frosting de queso crema", price: 39.99, image: "https://picsum.photos/400/300?random=3", alt: "Red velvet", category: "Tortas" },
      { id: 3, name: "Tres Leches", description: "Clásica, húmeda y suave", price: 34.99, image: "https://picsum.photos/400/300?random=4", alt: "Tres leches", category: "Tortas" },
      { id: 4, name: "Cheesecake Frutos Rojos", description: "Cremoso con salsa de frutos rojos", price: 42.50, image: "https://picsum.photos/400/300?random=5", alt: "Cheesecake", category: "Postres" },
      { id: 5, name: "Cupcake Vainilla", description: "Vainilla con topping suave", price: 6.50, image: "https://picsum.photos/400/300?random=6", alt: "Cupcake vainilla", category: "Cupcakes" },
      { id: 6, name: "Torta Zanahoria", description: "Con nueces y crema", price: 37.90, image: "https://picsum.photos/400/300?random=7", alt: "Carrot cake", category: "Tortas" },
    ];

    const grid = document.getElementById("catalogGrid");
    const search = document.getElementById("search");
    const category = document.getElementById("category");

    function render(items){
      grid.innerHTML = items.map(p => `
        <article class="card">
          <img src="${p.image}" alt="${p.alt}">
          <div class="p">
            <p class="name">${p.name}</p>
            <p class="desc">${p.description}</p>
            <div class="row">
              <span class="price">$${p.price.toFixed(2)}</span>
              <span class="tag">${p.category}</span>
            </div>
            <div style="margin-top:10px">
              <button class="btn" onclick="alert('Agregado: ${p.name}')">Agregar</button>
            </div>
          </div>
        </article>
      `).join("");
    }

    function applyFilters(){
      const q = search.value.trim().toLowerCase();
      const cat = category.value;

      const filtered = catalogoData.filter(p => {
        const matchText = (p.name + " " + p.description).toLowerCase().includes(q);
        const matchCat = (cat === "all") ? true : p.category === cat;
        return matchText && matchCat;
      });

      render(filtered);
    }

    search.addEventListener("input", applyFilters);
    category.addEventListener("change", applyFilters);

    render(catalogoData);
  </script>
</body>
</html>
